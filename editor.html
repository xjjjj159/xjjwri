<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>日记编辑器</title>
<style>
:root {
  --bg: #faf8f5;
  --text: #4a4a4a;
  --accent: #7a9a8a;
  --border: #e8e4df;
  --card: #fff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: "Noto Serif SC", "Songti SC", serif;
  background: var(--bg);
  color: var(--text);
  padding: 0.8rem;
  max-width: 600px;
  margin: 0 auto;
  -webkit-tap-highlight-color: transparent;
}

/* Tabs */
.tabs {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--border);
  margin-bottom: 1rem;
}
.tab {
  flex: 1;
  text-align: center;
  padding: 0.7rem 0;
  font-size: 0.9rem;
  letter-spacing: 0.05em;
  color: #999;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
}
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* Pages */
.page { display: none; }
.page.active { display: block; }

label {
  display: block;
  font-size: 0.85rem;
  color: #999;
  margin: 1rem 0 0.3rem;
  letter-spacing: 0.05em;
}
input, textarea {
  width: 100%;
  border: 1px solid var(--border);
  background: var(--card);
  padding: 0.8rem;
  font-size: 1rem;
  font-family: inherit;
  color: var(--text);
  border-radius: 4px;
  outline: none;
  transition: border-color 0.2s;
}
input:focus, textarea:focus { border-color: var(--accent); }
textarea {
  min-height: 50vh;
  line-height: 1.8;
  resize: vertical;
  font-size: 0.95rem;
}
textarea.short { min-height: 40vh; }

.img-preview {
  display: flex;
  gap: 0.5rem;
  flex-wrap: wrap;
  margin-top: 0.5rem;
}
.img-preview img {
  height: 80px;
  border-radius: 4px;
  border: 1px solid var(--border);
}
.upload-row {
  display: flex;
  gap: 0.5rem;
  align-items: center;
}
.upload-btn {
  display: inline-block;
  padding: 0.6rem 1.2rem;
  background: var(--bg);
  border: 1px solid var(--accent);
  color: var(--accent);
  border-radius: 4px;
  font-size: 0.85rem;
  cursor: pointer;
  letter-spacing: 0.05em;
}
.upload-btn:active { background: var(--accent); color: #fff; }
.btn {
  display: block;
  width: 100%;
  padding: 1rem;
  margin: 1.5rem 0 3rem;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 4px;
  font-size: 1.05rem;
  font-family: inherit;
  letter-spacing: 0.1em;
  cursor: pointer;
}
.btn:active { opacity: 0.8; }
.btn:disabled { background: #ccc; }

/* Search */
.search-results {
  list-style: none;
  margin-top: 1rem;
}
.search-results li {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 1rem;
  margin-bottom: 0.6rem;
  display: flex;
  align-items: flex-start;
  gap: 0.5rem;
}
.result-main { flex: 1; cursor: pointer; }
.result-main:active { background: #f5f3ee; margin: -1rem; padding: 1rem; border-radius: 4px; }
.delete-btn {
  flex-shrink: 0;
  width: 28px; height: 28px;
  border: 1px solid #e0dcd7;
  background: transparent;
  color: #bbb;
  font-size: 1rem;
  line-height: 1;
  border-radius: 50%;
  cursor: pointer;
  transition: all 0.2s;
}
.delete-btn:active { background: #e88; color: #fff; border-color: #e88; }
.search-results .result-title {
  font-size: 0.95rem;
  font-weight: 500;
  margin-bottom: 0.3rem;
}
.search-results .result-date {
  font-size: 0.75rem;
  color: #aaa;
  margin-bottom: 0.4rem;
}
.search-results .result-excerpt {
  font-size: 0.8rem;
  color: #777;
  line-height: 1.5;
  max-height: 3em;
  overflow: hidden;
}
.search-empty {
  text-align: center;
  color: #bbb;
  padding: 2rem;
  font-size: 0.9rem;
}

/* Toast */
.toast {
  position: fixed;
  top: 1rem;
  left: 50%;
  transform: translateX(-50%);
  background: #4a4a4a;
  color: #fff;
  padding: 0.7rem 1.5rem;
  border-radius: 20px;
  font-size: 0.9rem;
  z-index: 999;
  opacity: 0;
  transition: opacity 0.3s;
}
.toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="tabs">
  <div class="tab active" onclick="switchTab('write')">写日记</div>
  <div class="tab" onclick="switchTab('search')">搜索</div>
  <div class="tab" onclick="switchTab('about')">关于</div>
</div>

<!-- Write Page -->
<div class="page active" id="page-write">
  <label>日期</label>
  <input type="date" id="date">

  <label>标题</label>
  <input type="text" id="title" placeholder="给今天起个名字...">

  <label>
    配图
    <span style="font-weight:300;color:#bbb;">（可多张）</span>
  </label>
  <div class="upload-row">
    <label class="upload-btn" for="fileInput">📷 选择图片</label>
    <input type="file" id="fileInput" accept="image/*" multiple style="display:none">
    <span id="uploadHint" style="font-size:0.8rem;color:#ccc;"></span>
  </div>
  <div class="img-preview" id="preview"></div>

  <label>正文</label>
  <textarea id="content" placeholder="今天发生了什么呢..."></textarea>

  <button class="btn" id="publishBtn" onclick="publish()">发 布</button>
</div>

<!-- Search Page -->
<div class="page" id="page-search">
  <input type="text" id="searchInput" placeholder="搜索日记关键词..." oninput="doSearch()" style="margin-top:0.5rem;">
  <ul class="search-results" id="searchResults"></ul>
  <div class="search-empty" id="searchEmpty">输入关键词开始搜索</div>
</div>

<!-- About Page -->
<div class="page" id="page-about">
  <label>关于页面内容</label>
  <textarea id="aboutContent" class="short" placeholder="写一段关于自己或这个角落的话..."></textarea>
  <button class="btn" id="aboutSaveBtn" onclick="saveAbout()">保 存</button>
</div>

<div class="toast" id="toast"></div>

<script>
// Explicit element references (not relying on implicit globals)
var publishBtn = document.getElementById('publishBtn');
var titleEl = document.getElementById('title');
var contentEl = document.getElementById('content');
var dateEl = document.getElementById('date');
var fileInput = document.getElementById('fileInput');
var uploadHint = document.getElementById('uploadHint');
var preview = document.getElementById('preview');
var searchInput = document.getElementById('searchInput');
var searchResults = document.getElementById('searchResults');
var searchEmpty = document.getElementById('searchEmpty');
var aboutContent = document.getElementById('aboutContent');
var aboutSaveBtn = document.getElementById('aboutSaveBtn');
var toast = document.getElementById('toast');

var currentTab = 'write';
var uploadedUrls = [];

dateEl.value = new Date().toISOString().slice(0, 10);

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(function(t, i) {
    t.classList.toggle('active', ['write','search','about'][i] === tab);
  });
  document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
  var page = document.getElementById('page-' + tab);
  if (page) page.classList.add('active');
  if (tab === 'about') loadAbout();
  if (tab === 'search') {
    if (searchInput) searchInput.value = '';
    doSearch();
  }
}

async function compressImage(file) {
  return new Promise(function(resolve) {
    var img = new Image();
    img.onload = function() {
      var maxW = 1200;
      var w = img.width, h = img.height;
      if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
      var canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      var ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      canvas.toBlob(function(blob) {
        resolve(new File([blob], file.name, { type: 'image/jpeg' }));
      }, 'image/jpeg', 0.75);
    };
    img.src = URL.createObjectURL(file);
  });
}

fileInput.onchange = async function() {
  var files = fileInput.files;
  for (var i = 0; i < files.length; i++) {
    var f = files[i];
    var big = f.size > 500000;
    uploadHint.textContent = big ? '压缩上传中...' : '上传中...';
    var compressed = big ? await compressImage(f) : f;
    var fd = new FormData();
    fd.append('image', compressed, compressed.name);
    var r = await fetch('/api/upload', { method: 'POST', body: fd });
    var d = await r.json();
    if (d.url) {
      uploadedUrls.push(d.url);
      var img = document.createElement('img');
      img.src = d.url;
      preview.appendChild(img);
      contentEl.value += '\n![图片](' + d.url + ')\n';
    }
    uploadHint.textContent = '';
  }
  fileInput.value = '';
};

async function publish() {
  if (!publishBtn) return;
  publishBtn.disabled = true;
  publishBtn.textContent = '发布中...';
  var body = {
    title: (titleEl.value || '').trim() || '无题',
    content: contentEl.value || '',
    date: dateEl.value || ''
  };
  try {
    var r = await fetch('/api/publish', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    var d = await r.json();
    showToast(d.message || '发布成功！');
    publishBtn.textContent = '已发布 ✓';
    setTimeout(function() {
      publishBtn.disabled = false;
      publishBtn.textContent = '发 布';
    }, 3000);
  } catch (err) {
    showToast('发布失败，请重试');
    publishBtn.disabled = false;
    publishBtn.textContent = '发 布';
  }
}

// Search
var searchTimer;
function doSearch() {
  if (!searchInput || !searchResults) return;
  clearTimeout(searchTimer);
  searchTimer = setTimeout(async function() {
    try {
      var q = searchInput.value.trim();
      var url = q ? '/api/search?q=' + encodeURIComponent(q) : '/api/search';
      var r = await fetch(url);
      var list = await r.json();
      if (searchEmpty) searchEmpty.style.display = 'none';
      if (!list || list.length === 0) {
        searchResults.innerHTML = '';
        if (searchEmpty) {
          searchEmpty.textContent = '没有找到匹配的日记';
          searchEmpty.style.display = '';
        }
        return;
      }
      searchResults.innerHTML = list.map(function(item) {
        return '<li>' +
          '<div class="result-main" onclick="openPost(\'' + item.file + '\')">' +
          '<div class="result-title">' + escHtml(item.title) + '</div>' +
          '<div class="result-date">' + item.date + '</div>' +
          '<div class="result-excerpt">' + escHtml(item.excerpt) + '</div>' +
          '</div>' +
          '<button class="delete-btn" onclick="deletePost(\'' + item.file + '\', event)" title="删除此日记">×</button>' +
        '</li>';
      }).join('');
    } catch (err) {
      console.error('搜索失败:', err);
      if (searchEmpty) {
        searchEmpty.textContent = '搜索出错，请重试';
        searchEmpty.style.display = '';
      }
    }
  }, 300);
}

function openPost(file) {
  window.open('/xjjwri/' + file.replace(/^\d{4}-\d{2}-\d{2}-/, '').replace(/-/g, '/') + '/', '_blank');
}

async function deletePost(file, ev) {
  ev.stopPropagation();
  if (!confirm('确定删除 «' + file + '» 吗？此操作不可撤销。')) return;
  try {
    var r = await fetch('/api/delete', {
      method: 'DELETE',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ file: file })
    });
    var d = await r.json();
    showToast(d.message || '已删除');
    doSearch();
  } catch (err) {
    showToast('删除失败');
  }
}

// About
async function loadAbout() {
  try {
    var r = await fetch('/api/about');
    var d = await r.json();
    if (aboutContent) aboutContent.value = d.content || '';
  } catch (err) {}
}

async function saveAbout() {
  if (!aboutSaveBtn) return;
  aboutSaveBtn.disabled = true;
  aboutSaveBtn.textContent = '保存中...';
  try {
    var r = await fetch('/api/about', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content: aboutContent ? aboutContent.value : '' })
    });
    var d = await r.json();
    showToast(d.message || '已保存');
    aboutSaveBtn.textContent = '已保存 ✓';
    setTimeout(function() {
      aboutSaveBtn.disabled = false;
      aboutSaveBtn.textContent = '保 存';
    }, 3000);
  } catch (err) {
    showToast('保存失败');
    aboutSaveBtn.disabled = false;
    aboutSaveBtn.textContent = '保 存';
  }
}

function escHtml(s) {
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function showToast(msg) {
  if (!toast) return;
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(function() { toast.classList.remove('show'); }, 2500);
}
</script>
</body>
</html>
