title: "日记"
description: "记录，让时间有迹可循"
author: "日记主人"
lang: "zh-CN"
encoding: "utf-8"
timezone: "Asia/Shanghai"

url: "https://xjjjj159.github.io"
baseurl: "/xjjwri"

permalink: /:year/:month/:day/:title/

defaults:
  - scope:
      path: "_posts"
    values:
      layout: "post"
  - scope:
      path: "uploads"
    values:
      uploads: true

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor
