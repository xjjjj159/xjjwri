<article class="post-card">
  <div class="post-card__date">
    <span>{{ post.date | date: "%Y" }}</span>
    <span class="post-card__date-divider">/</span>
    <span>{{ post.date | date: "%m" }}</span>
    <span class="post-card__date-divider">/</span>
    <span>{{ post.date | date: "%d" }}</span>
  </div>

  <h2 class="post-card__title">
    <a href="{{ site.baseurl }}{{ post.url }}">{{ post.title }}</a>
  </h2>

  {% assign excerpt_text = post.excerpt | strip_html | normalize_whitespace | truncate: 140 %}
  {% if excerpt_text != "" %}
  <div class="post-card__excerpt">{{ excerpt_text }}</div>
  {% endif %}
</article>
