<article class="post-card">
  <div class="post-card__date">
    <span class="post-card__date-year">{{ post.date | date: "%Y" }}</span>
    <span class="post-card__date-divider">/</span>
    <span class="post-card__date-month">{{ post.date | date: "%m" }}</span>
    <span class="post-card__date-divider">/</span>
    <span class="post-card__date-day">{{ post.date | date: "%d" }}</span>
  </div>

  <h2 class="post-card__title">
    <a href="{{ post.url }}">{{ post.title }}</a>
  </h2>

  {% if post.image %}
  <div class="post-card__image-wrapper">
    <img src="{{ post.image }}"
         alt="{{ post.image_alt | default: post.title }}"
         loading="lazy"
         class="post-card__image">
  </div>
  {% endif %}

  <div class="post-card__content">
    {{ post.excerpt | strip_html | truncate: 200 }}
  </div>

  <a href="{{ post.url }}" class="post-card__read-more">
    继续阅读 &rarr;
  </a>
</article>

<div class="post-divider">
  <span>&#183; &#183; &#183;</span>
</div>
