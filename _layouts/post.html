---
layout: default
---

<article class="post">
  <header class="post__header">
    <div class="post__date">
      <span>{{ page.date | date: "%Y" }}</span>
      <span class="post__date-divider">/</span>
      <span>{{ page.date | date: "%m" }}</span>
      <span class="post__date-divider">/</span>
      <span>{{ page.date | date: "%d" }}</span>
    </div>
    <h1 class="post__title">{{ page.title }}</h1>
  </header>

  {% if page.image %}
  <div class="post__image-wrapper">
    <img src="{{ page.image }}" alt="{{ page.image_alt | default: page.title }}" class="post__image" loading="lazy" decoding="async">
  </div>
  {% endif %}

  <div class="post__content">
    {{ content }}
  </div>
</article>
